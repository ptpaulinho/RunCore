services:
  - type: web
    name: runcore
    runtime: python
    buildCommand: pip install -e ".[server]"
    startCommand: python serve.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: RUNCORE_ENV
        value: production
      - key: RUNCORE_DB_PATH
        value: /tmp/cloud.db
      - key: RUNCORE_PUBLIC_URL
        value: https://runcore.onrender.com
      # Email is optional — set these in the Render dashboard to enable it:
      #   RUNCORE_SMTP_HOST, RUNCORE_SMTP_PORT, RUNCORE_SMTP_USER,
      #   RUNCORE_SMTP_PASS, RUNCORE_SMTP_FROM, RUNCORE_SMTP_TLS
