services:
  - type: web
    name: runcore
    runtime: python
    buildCommand: pip install -e ".[server]"
    startCommand: python serve.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: RUNCORE_ENV
        value: production
      - key: RUNCORE_DB_PATH
        value: /tmp/cloud.db
