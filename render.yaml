services:
  - type: web
    name: runcore
    runtime: python
    buildCommand: pip install -e ".[server]"
    startCommand: python serve.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: RUNCORE_ENV
        value: production
      - key: RUNCORE_DB_PATH
        value: /data/cloud.db
      - key: GROQ_API_KEY
        sync: false   # set in Render dashboard
      - key: GEMINI_API_KEY
        sync: false   # set in Render dashboard
    disk:
      name: runcore-data
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /health
