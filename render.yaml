services:
  - type: web
    name: runcore
    runtime: python
    buildCommand: pip install -e ".[all]"
    startCommand: uvicorn runcore.server.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: RUNCORE_ENV
        value: production
      - key: RUNCORE_DB_PATH
        value: /data/cloud.db
    disk:
      name: runcore-data
      mountPath: /data
      sizeGB: 1
