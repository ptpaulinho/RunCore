# Example: drop this into .github/workflows/agent-ci.yml in YOUR repo.
# It fails the PR when your agent regresses (more expensive or less reliable)
# vs the baseline you committed with `runcore ci --update-baseline`.
#
# NOTE: kept under docs/ci/ on purpose so it does NOT run on the RunCore repo
# itself. Copy it into your own repo's .github/workflows/.

name: Agent CI gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  runcore-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Option A — use the published action (recommended)
      - uses: ptpaulinho/RunCore/.github/actions/runcore-gate@main
        with:
          provider: groq
          suite: support
          runs: "3"
          max-cost-increase: "10"   # fail if cost/run +10%
          max-success-drop: "5"     # fail if success -5 points
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      # Option B — run the CLI directly (uncomment instead of the action above)
      # - uses: actions/setup-python@v5
      #   with: { python-version: "3.11" }
      # - run: pip install "runcore[server]"
      # - run: runcore ci --provider groq --suite support --runs 3
      #   env: { GROQ_API_KEY: "${{ secrets.GROQ_API_KEY }}" }
